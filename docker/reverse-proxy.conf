server {
  listen 80;
  server_name veritariffai.co www.veritariffai.co;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  return 301 https://veritariffai.co$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.veritariffai.co;

  ssl_certificate /etc/letsencrypt/live/veritariffai.co/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/veritariffai.co/privkey.pem;

  return 301 https://veritariffai.co$request_uri;
}

server {
  listen 443 ssl http2;
  server_name veritariffai.co;

  ssl_certificate /etc/letsencrypt/live/veritariffai.co/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/veritariffai.co/privkey.pem;

  client_max_body_size 20m;

  location /api/ {
    proxy_pass https://api.veritariffai.co;
    proxy_http_version 1.1;
    proxy_set_header Host api.veritariffai.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
