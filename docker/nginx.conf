server {
  listen 80;
  server_name www.veritariffai.co;

  return 301 http://veritariffai.co$request_uri;
}

server {
  listen 80;
  server_name veritariffai.co;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass https://api.veritariffai.co;
    proxy_http_version 1.1;
    proxy_set_header Host api.veritariffai.co;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
