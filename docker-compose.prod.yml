services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritariffai-front
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - proxy

  certbot:
    image: certbot/certbot:latest
    container_name: veritariffai-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

networks:
  proxy:
    external: true
    name: veritariffai-backend_external
