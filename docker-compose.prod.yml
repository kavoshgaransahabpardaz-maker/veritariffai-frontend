services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritariffai-front
    restart: unless-stopped
    expose:
      - "80"

  edge:
    image: nginx:1.27-alpine
    container_name: veritariffai-edge
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/reverse-proxy.conf.active:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot:latest
    container_name: veritariffai-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
